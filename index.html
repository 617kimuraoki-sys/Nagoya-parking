<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>栄パーキング - 栄周辺のコインパーキング料金比較</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">栄パーキング</h1>
    <p class="header__subtitle">栄周辺のコインパーキング料金比較</p>
  </header>

  <main class="main">
    <div class="sort-bar">
      <span class="sort-bar__label">並び替え</span>
      <div class="sort-bar__buttons">
        <button class="sort-btn is-active" data-sort="price">料金が安い順</button>
        <button class="sort-btn" data-sort="name">名前順</button>
      </div>
    </div>

    <ul id="parking-list" class="parking-list"></ul>
  </main>

  <footer class="footer">
    <p>※ 料金は変更される場合があります。最新情報は現地でご確認ください。</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>

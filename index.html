          <button class="chip is-active" data-sort="price">料金が安い順</button>

        <div class="chip-row" id="area-filters">
          <button class="chip is-active" data-area="all">全件</button>

        <span class="control-label">駐車時間で料金を試算 <span class="control-hint">タップで切替</span></span>
        <div class="chip-row" id="duration-filters">
          <button class="chip" data-hours="1">1時間</button>
          <button class="chip" data-hours="2">2時間</button>
          <button class="chip" data-hours="3">3時間</button>
          <button class="chip" data-hours="6">半日(6h)</button>
          <button class="chip" data-hours="12">12時間</button>
          <button class="chip" data-hours="24">1日(24h)</button>
        </div>
      </div>
    </div>

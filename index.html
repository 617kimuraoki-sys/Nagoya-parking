<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarMotiva | クルマ生活をもっと便利に</title>
  <meta name="description" content="クルマ生活をもっと便利にするアプリを開発・発信するブランド CarMotiva。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CarMotiva">
  <meta property="og:title" content="CarMotiva | クルマ生活をもっと便利に">
  <meta property="og:description" content="クルマ生活をもっと便利にするアプリを開発・発信するブランド。">
  <meta property="og:url" content="https://car-motiva.com">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6350822748465611" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, 'Hiragino Sans', sans-serif;
      background: #f4f7fb;
      color: #08101f;
      min-height: 100svh;
    }

    header {
      background:
        radial-gradient(ellipse 70% 80% at 110% -10%, rgba(59,130,246,.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at -10% 110%, rgba(29,78,216,.25) 0%, transparent 55%),
        linear-gradient(160deg, #050e28 0%, #0c1a45 50%, #162255 100%);
      padding: 64px 24px 56px;
      text-align: center;
    }
    .brand-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #93b8fb;
      opacity: .5;
      margin-bottom: 20px;
    }
    .header-icon { font-size: 52px; margin-bottom: 14px; }
    .header-title {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.05em;
      margin-bottom: 10px;
    }
    .header-sub {
      font-size: 14px;
      font-weight: 500;
      color: #93b8fb;
      opacity: .65;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 14px;
      padding-left: 2px;
    }
    .app-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

    .app-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 4px rgba(8,16,31,.04), 0 8px 24px rgba(8,16,31,.07);
      transition: transform .15s, box-shadow .15s;
    }
    .app-card:active { transform: scale(.98); }
    .app-icon {
      width: 60px; height: 60px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .icon-parking { background: linear-gradient(135deg, #0c1a45, #2563eb); }
    .icon-nenpi   { background: linear-gradient(135deg, #050e28, #1d4ed8); }
    .app-name {
      font-size: 16px;
      font-weight: 800;
      color: #08101f;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .app-desc {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.6;
    }
    .app-arrow { color: #c4cfde; flex-shrink: 0; }

    .coming-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      opacity: .45;
      box-shadow: 0 2px 4px rgba(8,16,31,.04);
    }
    .icon-soon {
      width: 60px; height: 60px;
      border-radius: 16px;
      background: #e5e7eb;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .soon-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #9ca3af;
      background: #f3f4f6;
      border-radius: 100px;
      padding: 2px 8px;
      margin-top: 5px;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: #c4cfde;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <header>
    <p class="brand-label">CarMotiva</p>
    <div class="header-icon">🚗</div>
    <p class="header-title">CarMotiva</p>
    <p class="header-sub">クルマ生活をもっと便利に</p>
  </header>

  <main>
    <p class="section-label">アプリ一覧</p>
    <div class="app-grid">

      <a class="app-card" href="/nagoya-parking/">
        <div class="app-icon icon-parking">🅿️</div>
        <div style="flex:1">
          <p class="app-name">名古屋パーキング</p>
          <p class="app-desc">名古屋市中心部107か所のコインパーキング料金を比較。エリア絞り込み・料金試算対応。</p>
        </div>
        <svg class="app-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>

      <a class="app-card" href="/nenpi-calc/">
        <div class="app-icon icon-nenpi">⛽</div>
        <div style="flex:1">
          <p class="app-name">燃費カンリ</p>
          <p class="app-desc">ODO計方式で正確・かんたんに燃費を記録。満タン基準方式で途中給油も対応。</p>
        </div>
        <svg class="app-arrow" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>

      <div class="coming-card">
        <div class="icon-soon">✨</div>
        <div>
          <p class="app-name" style="color:#9ca3af">Coming Soon</p>
          <span class="soon-badge">準備中</span>
        </div>
      </div>

    </div>
  </main>

  <footer>© 2025 CarMotiva</footer>

</body>
</html>
